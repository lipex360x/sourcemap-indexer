name: Mutation

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Module path to mutate (e.g. src/sourcemap_indexer/infra/fs/walker.py)"
        required: false
        default: "src/sourcemap_indexer/"

jobs:
  mutmut:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install project dependencies
        run: uv sync --all-extras

      - name: Bootstrap mutmut venv (Python 3.12)
        run: |
          uv venv --python 3.12 .mutmut-venv
          uv pip install --python .mutmut-venv mutmut pytest pytest-cov httpx pyyaml pathspec typer rich

      - name: Run mutmut
        run: PYTHONPATH=src .mutmut-venv/bin/mutmut run

      - name: Show survivors
        if: always()
        run: PYTHONPATH=src .mutmut-venv/bin/mutmut results
